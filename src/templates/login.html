<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        "
    >
        <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 20px">
            <tr>
                <td align="center">
                    <table
                        width="460"
                        cellpadding="0"
                        cellspacing="0"
                        style="background: #ffffff; border-radius: 8px; border: 1px solid #e5e5e5"
                    >
                        <tr>
                            <td style="padding: 40px 36px">
                                <p
                                    style="
                                        margin: 0 0 24px;
                                        font-size: 15px;
                                        font-weight: 600;
                                        color: #000000;
                                        letter-spacing: -0.3px;
                                    "
                                >
                                    Atelier UI
                                </p>
                                <p
                                    style="
                                        margin: 0 0 8px;
                                        font-size: 14px;
                                        color: #333333;
                                        line-height: 1.5;
                                    "
                                >
                                    Sign in to your account
                                </p>
                                <p
                                    style="
                                        margin: 0 0 28px;
                                        font-size: 13px;
                                        color: #888888;
                                        line-height: 1.5;
                                    "
                                >
                                    Click the button below to access your pro components. This link
                                    expires in 10 minutes.
                                </p>
                                <a
                                    href="{{LOGIN_LINK}}"
                                    style="
                                        display: inline-block;
                                        padding: 10px 24px;
                                        background: #000000;
                                        color: #ffffff;
                                        font-size: 13px;
                                        font-weight: 500;
                                        text-decoration: none;
                                        border-radius: 6px;
                                    "
                                    >Sign in</a
                                >
                                <p
                                    style="
                                        margin: 28px 0 0;
                                        font-size: 12px;
                                        color: #aaaaaa;
                                        line-height: 1.5;
                                    "
                                >
                                    If you didn't request this link, you can safely ignore this
                                    email.
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
